# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: telegraf-acex

before:
  hooks:
    - go mod tidy
    - go generate ./...
# Builds are still required for Docker images
builds:
  - main: ./cmd/main.go
    binary: telegraf-acex
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/acex-labs/telegraf-acex/plugins/inputs/acex.Version={{ .Version }}


archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    # format_overrides:
    #   - goos: windows
    #     format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

# Creates Linux packages.
# nfpms:
#   - file_name_template: "{{ .ConventionalFileName }}"
#     maintainer: Carlos Alexandro Becker <carlos@becker.software>
#     formats:
#       - deb
#       - apk
#       - rpm

# Creates Darwin universal binaries.
universal_binaries:
  - replace: true

# Enables source archives.
source:
  enabled: true

# SBOMs for the archives.
sboms:
  - artifacts: archive

dockers_v2:
  - images:
      - "ghcr.io/acex-labs/telegraf-acex"
    dockerfile: Dockerfile
    tags:
      - "{{ .Version }}"
      - "latest"
    labels:
      "org.opencontainers.image.description": "telegraf-acex"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    platforms:
      - linux/amd64
      - linux/arm64
